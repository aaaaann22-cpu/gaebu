  <button onclick="checkPw()" style="padding:12px 32px;background:var(--sage);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;width:220px">입력</button>
  <div id="pw-err" style="color:var(--red);font-size:12px;font-weight:700;display:none">비밀번호가 틀렸어요 🔒</div>
</div>
<script>
(function(){
  const PW='0912';
  const ok=sessionStorage.getItem('wfn_auth');
  const screen=document.getElementById('pw-screen');
  if(ok===PW){screen.style.display='none';return;}
  screen.style.display='flex';
  window.checkPw=function(){
    const v=document.getElementById('pw-input').value;
    if(v===PW){sessionStorage.setItem('wfn_auth',PW);screen.style.display='none';}
    else{const e=document.getElementById('pw-err');e.style.display='block';document.getElementById('pw-input').value='';document.getElementById('pw-input').focus();}
  };
})();
</script>

const W=n=>n===0?'₩0':'₩'+Number(n).toLocaleString('ko-KR');

function td(){const d=new Date();return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`}
window.toast=function(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200)};

function ss(s){const d=document.getElementById('sd'),l=document.getElementById('sl');if(s==='ok'){d.className='sync-dot ok';l.textContent='동기화됨'}if(s==='sync'){d.className='sync-dot syncing';l.textContent='저장 중...'}if(s==='err'){d.className='sync-dot err';l.textContent='오류'}}

onSnapshot(DOC,snap=>{D=snap.exists()?snap.data():dd();if(!snap.exists())setDoc(DOC,D);ss('ok');document.getElementById('ld').style.display='none';ra()},err=>{ss('err');try{const s=localStorage.getItem('wfn3');D=s?JSON.parse(s):dd()}catch(e){D=dd()}document.getElementById('ld').style.display='none';ra()});

window._sv=function(){if(!D)return;ss('sync');clearTimeout(ST);ST=setTimeout(async()=>{try{await setDoc(DOC,D);localStorage.setItem('wfn3',JSON.stringify(D));ss('ok')}catch(e){ss('err');toast('저장 실패')}},600)};

const TABS=['summary','income','budget','spend','invest','fixed'];
const SP_BUDGET=950000;
const INVCATS=[{n:'청약',ic:'🏠'},{n:'정기적금',ic:'💰'},{n:'자유적금',ic:'💵'},{n:'파킹통장',ic:'🅿️'},{n:'ISA',ic:'📈'},{n:'ETF',ic:'📊'},{n:'연금저축',ic:'👴'},{n:'IRP',ic:'🏦'}];
function curYM(){const d=new Date();return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}`}
function ymLabel(ym){const[y,m]=ym.split('.');return`${y}년 ${parseInt(m)}월`}
window.goTab=function(t){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.getElementById('pg-'+t).classList.add('on');document.querySelectorAll('.tab')[TABS.indexOf(t)].classList.add('on');ra()};

// calcs
function tInc(){return D.income.reduce((s,p)=>s+p.entries.reduce((a,e)=>a+e.a,0),0)}
function pInc(n){const p=D.income.find(x=>x.person===n);return p?p.entries.reduce((a,e)=>a+e.a,0):0}
function tBud(){return D.bg.reduce((s,g)=>s+g.items.reduce((a,i)=>a+i.t,0),0)}
function tPaid(){return D.bg.reduce((s,g)=>s+g.items.reduce((a,i)=>a+i.p,0),0)}
function tFix(){return D.fc.reduce((s,c)=>s+c.items.reduce((a,i)=>a+i.a,0),0)}
function tSpd(){return D.spends.reduce((s,x)=>s+x.a,0)}

// ── Summary ──
function rSum(){
  const inc=tInc(),bud=tBud(),paid=tPaid(),spd=tSpd(),rem=bud-paid,bal=inc-paid;
  const pp=bud>0?Math.min(100,Math.round(paid/bud*100)):0,ip=bud>0?Math.min(100,Math.round(inc/bud*100)):0,fm=tFix();
  document.getElementById('hs').textContent=`수입 ${W(inc)} · 웨딩예산 ${W(bud)}`;
  const up=D.bg.flatMap(g=>g.items.map(i=>({...i,gn:g.n,gi:g.ic}))).filter(i=>i.t-i.p>0).sort((a,b)=>(b.t-b.p)-(a.t-a.p));
  document.getElementById('pg-summary').innerHTML=`
  <div class="sg">
    <div class="card full"><div class="kv-lbl">💰 총 모인 돈</div><div class="kv-val c-s">${W(inc)}</div>
    <div class="kv-sub">${D.income.map(p=>`${p.person} ${W(pInc(p.person))}`).join(' + ')}</div>
    <div class="pb-wrap"><div class="pb pb-sage" style="width:${ip}%"></div></div><div class="kv-sub" style="margin-top:4px">웨딩예산 대비 ${ip}%</div></div>
    <div class="card"><div class="kv-lbl">📋 웨딩 예산</div><div class="kv-val c-n" style="font-size:16px">${W(bud)}</div><div class="kv-sub">${D.bg.length}개 분류</div></div>
    <div class="card"><div class="kv-lbl">✅ 납부완료</div><div class="kv-val c-g" style="font-size:16px">${W(paid)}</div><div class="kv-sub">${pp}% 납부</div><div class="pb-wrap"><div class="pb pb-green" style="width:${pp}%"></div></div></div>
    <div class="card"><div class="kv-lbl">⏳ 잔금</div><div class="kv-val ${rem>0?'c-r':'c-g'}" style="font-size:16px">${W(rem)}</div><div class="kv-sub">${up.length}건 남음</div></div>
    <div class="card"><div class="kv-lbl">💸 지출기록</div><div class="kv-val c-go" style="font-size:16px">${W(spd)}</div><div class="kv-sub">${D.spends.length}건</div></div>
    <div class="card"><div class="kv-lbl">🔄 월 고정비</div><div class="kv-val c-n" style="font-size:16px">${W(fm)}</div><div class="kv-sub">연 ${W(fm*12)}</div></div>
    <div class="card full"><div class="kv-lbl">💳 여유자금 (수입 − 납부완료)</div><div class="kv-val ${bal>=0?'c-g':'c-r'}">${W(bal)}</div></div>
  </div>
  <div class="sec">⏳ 잔금 남은 항목</div>
  ${up.length===0?'<div class="empty"><div class="ei">🎉</div>모든 항목 납부 완료!</div>':up.map(e=>{const r=e.t-e.p,pc=e.t>0?Math.round(e.p/e.t*100):0;return`
  <div class="card card-sm" style="display:flex;align-items:center;gap:10px">
    <div class="bi-icon" style="background:var(--sage-l)">${e.gi}</div>
    <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:800">${e.gn} · ${e.n}</div><div class="pb-wrap" style="margin-top:5px"><div class="pb pb-sage" style="width:${pc}%"></div></div><div style="font-size:10px;color:var(--g4);margin-top:2px">${pc}% 납부</div></div>
    <div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:900;color:var(--red)">${W(r)}</div><div style="font-size:10px;color:var(--g4)">잔금</div></div>
  </div>`}).join('')}`;
}

// ── Income ──
function rInc(){
  const cols={아현:'sage',대인:'navy'};const emos={아현:'👩',대인:'👨'};
  let h='';
  D.income.forEach((p,pi)=>{
    const total=p.entries.reduce((a,e)=>a+e.a,0);
    const co=cols[p.person]||'navy';
    h+=`<div class="ip">
      <div class="ip-head">
        <div class="ip-name">${emos[p.person]||'👤'} ${p.person}</div>
        <div style="display:flex;align-items:center">
          <div class="ip-total c-${co}">${W(total)}</div>
          <button class="ip-del" onclick="delPerson(${pi})">삭제</button>
        </div>
      </div>
      ${p.entries.map((e,ei)=>`
      <div class="mr">
        <span class="mr-label">${e.m}</span>
        <span class="mr-amt c-${co}">${W(e.a)}</span>
        <button class="mr-btn" onclick="editMonth(${pi},${ei})">수정</button>
        <button class="mr-del" onclick="delMonth(${pi},${ei})">×</button>
      </div>`).join('')}
      <div style="padding:10px 14px">
        <button class="bx" style="background:var(--${co==='sage'?'sage':'navy'}-l);color:var(--${co});padding:6px 12px;font-size:12px" onclick="addMonth(${pi})">＋ 수입월 추가</button>
      </div>
    </div>`;
  });
  document.getElementById('pg-income').innerHTML=h;
}

window.addMonth=function(pi){
  CM={act:'addMonth',pi};
  oM('💰 수입월 추가',`
    <div class="fg"><label>월 (예: 26년10월)</label><input id="f0" placeholder="26년10월"></div>
    <div class="fg"><label>금액 (원)</label><input id="f1" type="number" placeholder="0"></div>`);
};
window.editMonth=function(pi,ei){
  const e=D.income[pi].entries[ei];
  CM={act:'editMonth',pi,ei};
  oM(`✏️ ${D.income[pi].person} — ${e.m} 수정`,`
    <div class="fg"><label>월</label><input id="f0" value="${e.m}"></div>
    <div class="fg"><label>금액 (원)</label><input id="f1" type="number" value="${e.a}"></div>`);
};
window.delMonth=function(pi,ei){
  if(!confirm('이 월 수입을 삭제할까요?'))return;
  D.income[pi].entries.splice(ei,1);
  window._sv();ra();toast('삭제됐어요');
};
window.delPerson=function(pi){
  const name=D.income[pi].person;
  if(!confirm(`${name}의 수입 데이터를 모두 삭제할까요?`))return;
  D.income.splice(pi,1);
  window._sv();ra();toast(`${name} 삭제됐어요`);
};

// ── Budget ──
function rBud(){
  let h='';
  D.bg.forEach(g=>{
    const gt=g.items.reduce((s,i)=>s+i.t,0),gp=g.items.reduce((s,i)=>s+i.p,0),gr=gt-gp;
    const pc=gt>0?Math.min(100,Math.round(gp/gt*100)):0;
    const bd=gr===0&&gt>0?'<span class="badge b-ok">완납</span>':gp===0&&gt>0?'<span class="badge b-no">미납</span>':gt>0?'<span class="badge b-pt">부분</span>':'';
    const op=D.og[g.id];
    h+=`<div class="bi"><div class="bi-head" onclick="tg(${g.id})">
      <div class="bi-icon" style="background:var(--sage-l)">${g.ic}</div>
      <div class="bi-info"><div class="bi-name">${g.n}${bd}<span class="bi-chev ${op?'open':''}">▼</span></div>
      ${gt>0?`<div class="pb-wrap" style="margin-top:4px"><div class="pb pb-sage" style="width:${pc}%"></div></div>`:''}<div class="bi-meta">${gt>0?`예산 ${W(gt)} · 납부 ${W(gp)}`:'항목 없음'}</div></div>
      <div class="bi-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div style="display:flex;gap:4px" onclick="event.stopPropagation()">
          <button class="bx bx-e" onclick="eGr(${g.id})">수정</button>
          <button class="bx bx-d" onclick="dGr(${g.id})">삭제</button>
        </div>
        <div class="bi-paid ${gr>0?'c-r':gt>0?'c-g':'c-go'}">${gt>0?W(gp):'-'}</div>
        <div class="bi-sub">${gr>0?`잔금 ${W(gr)}`:gt>0?'완납':''}</div>
      </div>
    </div>
    ${op?`<div class="bi-kids">
      ${g.items.length===0?'<div class="empty" style="padding:14px">항목을 추가하세요</div>':''}
      ${g.items.map(it=>{const ir=it.t-it.p,ipc=it.t>0?Math.min(100,Math.round(it.p/it.t*100)):0;return`<div class="bi-kid"><div class="bk-l"><div class="bk-name">${it.n}</div>${it.m?`<div class="bk-memo">📝 ${it.m}</div>`:''}${it.t>0?`<div class="pb-wrap" style="margin-top:4px;max-width:160px"><div class="pb pb-sage" style="width:${ipc}%"></div></div>`:''}<div class="bk-act"><button class="bx bx-e" onclick="eIt(${g.id},${it.id})">수정</button><button class="bx bx-d" onclick="dIt(${g.id},${it.id})">삭제</button></div></div><div class="bk-r"><div class="bk-paid ${ir>0?'c-r':it.t>0?'c-g':'c-go'}">${it.t>0?W(it.p):'-'}</div><div class="bk-rem">${it.t>0?`/ ${W(it.t)}`:''}</div>${ir>0?`<div class="bk-rem" style="color:var(--red)">잔금 ${W(ir)}</div>`:''}</div></div>`}).join('')}
      <div style="padding:8px 13px 10px 47px"><button class="bx bx-e" style="background:var(--sage-l);color:var(--sage)" onclick="aIt(${g.id})">＋ 하위항목 추가</button></div>
    </div>`:''}
    </div>`;
  });
  document.getElementById('pg-budget').innerHTML=h+`<button class="ab" onclick="aGr()">＋ 분류 추가</button>`;
}
window.tg=function(id){D.og[id]=!D.og[id];window._sv();rBud()};
window.eGr=function(id){const g=D.bg.find(x=>x.id===id);if(!g)return;CM={act:'eGr',id};oM('✏️ 분류 수정',`<div class="fg"><label>분류명</label><input id="f0" value="${g.n}"></div><div class="fg"><label>이모지</label><input id="f1" value="${g.ic}" maxlength="4"></div>`)};
window.dGr=function(id){const g=D.bg.find(x=>x.id===id);if(!g)return;if(!confirm(`'${g.n}' 분류와 하위 항목을 모두 삭제할까요?`))return;D.bg=D.bg.filter(x=>x.id!==id);window._sv();ra();toast('분류 삭제됐어요')};

// ── Spend ──
function rSpd(){
  const ym=curYM();
  const curList=D.spends.filter(s=>spMonth(s.d)===ym);
  const curTot=curList.reduce((a,s)=>a+s.a,0);
  const curPc=SP_BUDGET>0?Math.min(100,Math.round(curTot/SP_BUDGET*100)):0;
  const budRem=SP_BUDGET-curTot;
  let h=`<div class="card" style="margin-bottom:10px">
    <div class="kv-lbl">💸 ${ymLabel(ym)} 생활비 현황</div>
    <div style="display:flex;align-items:flex-end;gap:8px;margin-top:4px">
      <div class="kv-val ${curTot>SP_BUDGET?'c-r':'c-s'}">${W(curTot)}</div>
      <div style="font-size:13px;color:var(--g3);margin-bottom:2px">/ ${W(SP_BUDGET)}</div>
      <div style="font-size:13px;font-weight:800;color:${curTot>SP_BUDGET?'var(--red)':'var(--sage)'};margin-bottom:2px;margin-left:auto">${curPc}%</div>
    </div>
    <div class="pb-wrap" style="margin-top:8px"><div class="pb ${curTot>SP_BUDGET?'pb-navy':'pb-sage'}" style="width:${curPc}%"></div></div>
    <div style="font-size:11px;color:var(--g4);margin-top:5px">${budRem>=0?`남은 예산 ${W(budRem)}`:`예산 ${W(-budRem)} 초과`} · ${curList.length}건</div>
  </div>`;
  if(D.spends.length===0){
    document.getElementById('pg-spend').innerHTML=h+'<div class="empty"><div class="ei">📝</div>지출 기록을 추가해보세요</div><button class="ab" onclick="aSp()">＋ 지출 추가</button>';
    return;
  }
  // group by month
  const byMonth={};
  D.spends.forEach(s=>{const mk=spMonth(s.d);(byMonth[mk]=byMonth[mk]||[]).push(s)});
  const months=Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));
  months.forEach(mk=>{
    const list=byMonth[mk];
    const mtot=list.reduce((a,s)=>a+s.a,0);
    // category totals
    const cat={};
    list.forEach(s=>{const c=s.c||'기타';cat[c]=(cat[c]||0)+s.a});
    const catArr=Object.entries(cat).sort((a,b)=>b[1]-a[1]);
    const op=D.osp?(D.osp[mk]!==false):true;
    const mpc=SP_BUDGET>0?Math.min(100,Math.round(mtot/SP_BUDGET*100)):0;
    h+=`<div class="sec">📅 ${ymLabel(mk)} <span style="color:var(--sage);font-weight:900;margin-left:4px">${W(mtot)}</span><span style="color:var(--g4);font-size:10px;font-weight:600;margin-left:6px">예산 ${mpc}%</span></div>`;
    // category summary
    h+=`<div class="card card-sm">`;
    h+=catArr.map(([c,v])=>{const pc=mtot>0?Math.round(v/mtot*100):0;return `<div style="display:flex;align-items:center;gap:9px;padding:5px 0">
        <div class="bi-icon" style="width:30px;height:30px;font-size:15px;background:var(--sage-l)">${SPCAT_IC[c]||'💸'}</div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">${c}</div><div class="pb-wrap" style="margin-top:4px"><div class="pb pb-sage" style="width:${pc}%"></div></div></div>
        <div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:800;color:var(--sage)">${W(v)}</div><div style="font-size:10px;color:var(--g4)">${pc}%</div></div>
      </div>`}).join('');
    h+=`<div style="text-align:center;margin-top:6px"><button class="bx bx-e" style="background:var(--sage-l);color:var(--sage)" onclick="tgSp('${mk}')">${op?'▲ 상세내역 접기':'▼ 상세내역 보기'}</button></div></div>`;
    // detail entries
    if(op){
      [...list].sort((a,b)=>String(b.d).localeCompare(String(a.d))).forEach(s=>{
        h+=`<div class="sp"><div class="sp-top"><div class="sp-name">${s.n}</div><span class="sp-cat">${SPCAT_IC[s.c]||'💸'} ${s.c||'기타'}</span></div>${s.m?`<div class="sp-memo">${s.m}</div>`:''}<div class="sp-bot"><div class="sp-amt c-s">${W(s.a)}</div><div class="sp-date">${s.d}</div></div><div class="bk-act" style="margin-top:6px"><button class="bx bx-e" onclick="eSp(${s.id})">수정</button><button class="bx bx-d" onclick="dSp(${s.id})">삭제</button></div></div>`;
      });
    }
  });
  document.getElementById('pg-spend').innerHTML=h+`<button class="ab" onclick="aSp()">＋ 지출 추가</button>`;
}
window.tgSp=function(mk){D.osp=D.osp||{};D.osp[mk]=D.osp[mk]===false;window._sv();rSpd()};

// ── Invest ──
function rInv(){
  if(!D.invest)D.invest=[];
  if(D.invGoal===undefined)D.invGoal=3390000;
  const ym=curYM();
  // all months that have data
  const allYMs=[...new Set(D.invest.map(x=>x.ym))].sort((a,b)=>b.localeCompare(a));
  if(!allYMs.includes(ym))allYMs.unshift(ym);

  let h='';
  allYMs.forEach(mk=>{
    const list=D.invest.filter(x=>x.ym===mk);
    const savCats=['청약','정기적금','자유적금','파킹통장'];
    const savTot=list.filter(x=>savCats.includes(x.cat)).reduce((a,x)=>a+x.a,0);
    const invTot=list.filter(x=>!savCats.includes(x.cat)).reduce((a,x)=>a+x.a,0);
    const goal=D.invGoal;
    const pc=goal>0?Math.min(100,Math.round(savTot/goal*100)):0;
    const isCur=mk===ym;
    h+=`<div class="sec">📅 ${ymLabel(mk)}${isCur?' <span style="background:var(--sage);color:#fff;font-size:9px;padding:2px 6px;border-radius:99px;margin-left:4px">이번달</span>':''}</div>
    <div class="card" style="margin-bottom:8px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div><div class="kv-lbl">🎯 저축 목표</div><div style="font-size:16px;font-weight:900;color:var(--navy)">${W(goal)}</div></div>
        <div><div class="kv-lbl">✅ 저축 실적</div><div style="font-size:16px;font-weight:900;color:${savTot>=goal?'var(--green)':'var(--sage)'}">${W(savTot)}</div></div>
        <div><div class="kv-lbl">📊 달성률</div><div style="font-size:16px;font-weight:900;color:${pc>=100?'var(--green)':'var(--gold)'}">${pc}% ${pc>=100?'✅':''}</div></div>
        <div><div class="kv-lbl">📈 투자 실적</div><div style="font-size:16px;font-weight:900;color:var(--navy)">${W(invTot)}</div></div>
      </div>
      <div class="pb-wrap"><div class="pb pb-navy" style="width:${pc}%"></div></div>
    </div>
    <div style="margin-bottom:4px">
    ${INVCATS.map(cat=>{
      const ah=list.find(x=>x.cat===cat.n&&x.person==='아현');
      const di=list.find(x=>x.cat===cat.n&&x.person==='대인');
      const bothDone=!!ah&&!!di;
      const anyDone=!!ah||!!di;
      return`<div class="card card-sm" style="margin-bottom:7px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <div style="font-size:18px">${bothDone?'✅':anyDone?'⏳':'⏳'}</div>
          <div style="font-size:13px;font-weight:800">${cat.ic} ${cat.n}</div>
          <div style="margin-left:auto;font-size:13px;font-weight:900;color:var(--navy)">${anyDone?W((ah?.a||0)+(di?.a||0)):'-'}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <div style="background:var(--sage-l);border-radius:8px;padding:8px 9px">
            <div style="font-size:10px;font-weight:800;color:var(--sage);margin-bottom:3px">👩 아현</div>
            <div style="font-size:13px;font-weight:800;color:${ah?'var(--g1)':'var(--g4)'}">${ah?W(ah.a):'미입력'}</div>
            <div class="bk-act" style="margin-top:5px">
              <button class="bx bx-e" onclick="eIv('${mk}','${cat.n}','아현')">${ah?'수정':'입력'}</button>
              ${ah?`<button class="bx bx-d" onclick="dIv('${mk}','${cat.n}','아현')">삭제</button>`:''}
            </div>
          </div>
          <div style="background:var(--navy-l);border-radius:8px;padding:8px 9px">
            <div style="font-size:10px;font-weight:800;color:var(--navy);margin-bottom:3px">👨 대인</div>
            <div style="font-size:13px;font-weight:800;color:${di?'var(--g1)':'var(--g4)'}">${di?W(di.a):'미입력'}</div>
            <div class="bk-act" style="margin-top:5px">
              <button class="bx bx-e" onclick="eIv('${mk}','${cat.n}','대인')">${di?'수정':'입력'}</button>
              ${di?`<button class="bx bx-d" onclick="dIv('${mk}','${cat.n}','대인')">삭제</button>`:''}
            </div>
          </div>
        </div>
      </div>`;
    }).join('')}
    </div>`;
  });
  h+=`<button class="ab nv" onclick="setInvGoal()">🎯 저축 목표 변경 (현재 ${W(D.invGoal)})</button>`;
  document.getElementById('pg-invest').innerHTML=h;
}
window.eIv=function(ym,cat,person){
  const entry=D.invest?.find(x=>x.ym===ym&&x.cat===cat&&x.person===person);
  CM={act:'eIv',ym,cat,person};
  const ic=INVCATS.find(x=>x.n===cat)?.ic||'';
  const emoji=person==='아현'?'👩':'👨';
  oM(`${ic} ${cat} — ${emoji} ${person} (${ymLabel(ym)})`,`<div class="fg"><label>금액 (원)</label><input id="f0" type="number" value="${entry?entry.a:''}" placeholder="0"></div><div class="fg"><label>메모</label><input id="f1" placeholder="비고" value="${entry?entry.m||'':''}"></div>`,'nv');
};
window.dIv=function(ym,cat,person){
  if(!confirm('삭제할까요?'))return;
  D.invest=D.invest.filter(x=>!(x.ym===ym&&x.cat===cat&&x.person===person));
  window._sv();ra();toast('삭제됐어요');
};
window.setInvGoal=function(){
  CM={act:'setInvGoal'};
  oM('🎯 저축 목표 변경',`<div class="fg"><label>월 저축 목표 (원)</label><input id="f0" type="number" value="${D.invGoal||3390000}"></div>`,'nv');
};

// ── Fixed ──
function rFix(){
  const tot=tFix();
  let h=`<div class="card" style="margin-bottom:2px"><div class="kv-lbl">월 고정비 합계</div><div class="kv-val c-n">${W(tot)}</div><div class="kv-sub">연 ${W(tot*12)}</div></div><div class="sec">카테고리별</div>`;
  D.fc.forEach(cat=>{
    const ct=cat.items.reduce((s,i)=>s+i.a,0);const op=D.ofc[cat.id];
    h+=`<div class="fc"><div class="fc-h" onclick="tfc('${cat.id}')">
      <div class="fc-i" style="background:${cat.co}22">${cat.ic}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:800">${cat.n} <span class="bi-chev ${op?'open':''}">▼</span></div><div style="font-size:11px;color:var(--g3)">${cat.items.length}개 항목</div></div>
      <div class="chip">${W(ct)}/월</div>
    </div>
    ${op?`<div class="fc-items">${cat.items.map(it=>`<div class="fc-row"><div><div style="font-size:13px;font-weight:600">${it.n}</div>${it.r?`<div style="font-size:10px;color:var(--g4);margin-top:1px">갱신 ${it.r}</div>`:''}<div class="bk-act" style="margin-top:4px"><button class="bx bx-e" onclick="eFi('${cat.id}','${it.id}')">수정</button><button class="bx bx-d" onclick="dFi('${cat.id}','${it.id}')">삭제</button></div></div><div style="text-align:right"><div style="font-size:13px;font-weight:800;color:var(--navy)">${W(it.a)}</div><div style="font-size:10px;color:var(--g4)">매월</div></div></div>`).join('')}
    <div style="padding:8px 13px 10px 47px"><button class="bx bx-e" style="background:var(--navy-l);color:var(--navy)" onclick="aFi('${cat.id}')">＋ 항목 추가</button></div></div>`:''}
    </div>`;
  });
  h+=`<button class="ab nv" onclick="aFc()">＋ 카테고리 추가</button>`;
  document.getElementById('pg-fixed').innerHTML=h;
}
window.tfc=function(id){D.ofc[id]=!D.ofc[id];window._sv();rFix()};

// ── Modal ──
function oM(title,body,sc=''){document.getElementById('mt').textContent=title;document.getElementById('mb').innerHTML=body;document.getElementById('ms').className='btn-s'+(sc?' '+sc:'');document.getElementById('modal').classList.add('on')}
window.closeModal=function(){document.getElementById('modal').classList.remove('on')};

// budget modals
window.aGr=function(){CM={act:'aGr'};oM('➕ 분류 추가','<div class="fg"><label>분류명</label><input id="f0" placeholder="예: 스드메"></div><div class="fg"><label>이모지</label><input id="f1" placeholder="예: 💄" maxlength="4"></div>')};
window.aIt=function(gid){CM={act:'aIt',gid};oM('➕ 하위 항목 추가','<div class="fg"><label>항목명</label><input id="f0" placeholder="예: 스튜디오A"></div><div class="frow"><div class="fg"><label>총 계약금</label><input id="f1" type="number" placeholder="0"></div><div class="fg"><label>납부금액</label><input id="f2" type="number" placeholder="0"></div></div><div class="fg"><label>메모</label><textarea id="f3" placeholder="특이사항 등"></textarea></div>')};
window.eIt=function(gid,iid){const g=D.bg.find(x=>x.id===gid),it=g?.items.find(x=>x.id===iid);if(!it)return;CM={act:'eIt',gid,iid};oM('✏️ 항목 수정',`<div class="fg"><label>항목명</label><input id="f0" value="${it.n}"></div><div class="frow"><div class="fg"><label>총 계약금</label><input id="f1" type="number" value="${it.t}"></div><div class="fg"><label>납부금액</label><input id="f2" type="number" value="${it.p}"></div></div><div class="fg"><label>메모</label><textarea id="f3">${it.m||''}</textarea></div>`)};
window.dIt=function(gid,iid){if(!confirm('삭제?'))return;const g=D.bg.find(x=>x.id===gid);if(g)g.items=g.items.filter(x=>x.id!==iid);window._sv();ra();toast('삭제됐어요')};
// spend modals
window.aSp=function(){CM={act:'aSp'};oM('➕ 지출 추가',`<div class="fg"><label>분류 (먼저 선택)</label><select id="f3">${SPCATS.map(c=>`<option>${SPCAT_IC[c]} ${c}</option>`).join('')}</select></div><div class="fg"><label>내용</label><input id="f0" placeholder="예: 점심 김밥"></div><div class="frow"><div class="fg"><label>금액</label><input id="f1" type="number" placeholder="0"></div><div class="fg"><label>날짜</label><input id="f2" type="date" value="${new Date().toISOString().slice(0,10)}"></div></div><div class="fg"><label>메모</label><textarea id="f4" placeholder="비고"></textarea></div>`)};
window.eSp=function(sid){const s=D.spends.find(x=>x.id===sid);if(!s)return;CM={act:'eSp',sid};oM('✏️ 지출 수정',`<div class="fg"><label>분류</label><select id="f3">${SPCATS.map(c=>`<option ${s.c===c?'selected':''}>${SPCAT_IC[c]} ${c}</option>`).join('')}</select></div><div class="fg"><label>내용</label><input id="f0" value="${s.n}"></div><div class="frow"><div class="fg"><label>금액</label><input id="f1" type="number" value="${s.a}"></div><div class="fg"><label>날짜</label><input id="f2" type="date" value="${s.d}"></div></div><div class="fg"><label>메모</label><textarea id="f4">${s.m||''}</textarea></div>`)};
window.dSp=function(sid){if(!confirm('삭제?'))return;D.spends=D.spends.filter(x=>x.id!==sid);window._sv();ra();toast('삭제됐어요')};
// fixed modals
window.aFc=function(){CM={act:'aFc'};oM('➕ 카테고리 추가','<div class="fg"><label>카테고리명</label><input id="f0" placeholder="예: 월세"></div><div class="fg"><label>이모지</label><input id="f1" placeholder="예: 🏠" maxlength="4"></div>','nv')};
window.aFi=function(cid){CM={act:'aFi',cid};oM('➕ 고정비 항목','<div class="fg"><label>항목명</label><input id="f0" placeholder="예: 월세"></div><div class="fg"><label>월 금액</label><input id="f1" type="number" placeholder="0"></div><div class="fg"><label>갱신일 (선택)</label><input id="f2" type="date"></div>','nv')};
window.eFi=function(cid,iid){const c=D.fc.find(x=>x.id===cid),it=c?.items.find(x=>x.id===iid);if(!it)return;CM={act:'eFi',cid,iid};oM('✏️ 고정비 수정',`<div class="fg"><label>항목명</label><input id="f0" value="${it.n}"></div><div class="fg"><label>월 금액</label><input id="f1" type="number" value="${it.a}"></div><div class="fg"><label>갱신일</label><input id="f2" type="date" value="${it.r||''}"></div>`,'nv')};
window.dFi=function(cid,iid){if(!confirm('삭제?'))return;const c=D.fc.find(x=>x.id===cid);if(c)c.items=c.items.filter(x=>x.id!==iid);window._sv();ra();toast('삭제됐어요')};

// ── Save ──
window.doSave=function(){
  const{act,pi,ei,gid,iid,sid,cid}=CM;
  const v=id=>(document.getElementById(id)?.value||'').trim();
  const n=id=>P(document.getElementById(id)?.value||'0');

  if(act==='addMonth'){
    const m=v('f0'),a=n('f1');if(!m){toast('월을 입력해주세요');return}
    D.income[pi].entries.push({m,a});
  }else if(act==='editMonth'){
    const m=v('f0'),a=n('f1');if(!m){toast('월을 입력해주세요');return}
    D.income[pi].entries[ei]={m,a};
  }else if(act==='eGr'){
    const g=D.bg.find(x=>x.id===CM.id);if(g){g.n=v('f0')||g.n;g.ic=v('f1')||g.ic}
  }else if(act==='aGr'){
    const nm=v('f0'),ic=v('f1')||'📌';if(!nm){toast('분류명을 입력해주세요');return}
    D.bg.push({id:D.nid.g++,n:nm,ic,items:[]});
  }else if(act==='aIt'){
    const nm=v('f0'),t=n('f1'),p=n('f2'),m=v('f3');if(!nm){toast('항목명을 입력해주세요');return}
    if(p>t&&t>0){toast('납부금이 초과합니다');return}
    const g=D.bg.find(x=>x.id===gid);if(g)g.items.push({id:D.nid.i++,n:nm,t,p,m});
  }else if(act==='eIt'){
    const nm=v('f0'),t=n('f1'),p=n('f2'),m=v('f3');if(!nm){toast('항목명을 입력해주세요');return}
    const g=D.bg.find(x=>x.id===gid),it=g?.items.find(x=>x.id===iid);
    if(it){it.n=nm;it.t=t;it.p=p;it.m=m}
  }else if(act==='aSp'){
    const nm=v('f0'),a=n('f1'),d=v('f2')||td();const c=SPCATS.find(x=>v('f3').includes(x))||'기타';const m=v('f4');
    if(!nm){toast('내용을 입력해주세요');return}
    D.spends.push({id:D.nid.s++,n:nm,a,d,c,m});
  }else if(act==='eSp'){
    const s=D.spends.find(x=>x.id===sid);if(s){s.n=v('f0');s.a=n('f1');s.d=v('f2');s.c=SPCATS.find(x=>v('f3').includes(x))||'기타';s.m=v('f4')}
  }else if(act==='eIv'){
    if(!D.invest)D.invest=[];
    const a=n('f0'),memo=v('f1'),{ym,cat,person}=CM;
    if(!a){toast('금액을 입력해주세요');return}
    const idx=D.invest.findIndex(x=>x.ym===ym&&x.cat===cat&&x.person===person);
    if(idx>=0)D.invest[idx]={ym,cat,person,a,m:memo};
    else D.invest.push({id:D.nid.iv++,ym,cat,person,a,m:memo});
  }else if(act==='setInvGoal'){
    const g=n('f0');if(g>0)D.invGoal=g;
  }else if(act==='aFc'){
    const nm=v('f0'),ic=v('f1')||'💳';if(!nm){toast('카테고리명을 입력해주세요');return}
    D.fc.push({id:'c'+D.nid.fc++,n:nm,ic,co:'#718096',items:[]});
  }else if(act==='aFi'){
    const nm=v('f0'),a=n('f1'),r=v('f2');if(!nm){toast('항목명을 입력해주세요');return}
    const c=D.fc.find(x=>x.id===cid);if(c)c.items.push({id:'i'+D.nid.fi++,n:nm,a,r});
  }else if(act==='eFi'){
    const c=D.fc.find(x=>x.id===cid),it=c?.items.find(x=>x.id===iid);
    if(it){it.n=v('f0');it.a=n('f1');it.r=v('f2')}
  }
  window._sv();closeModal();ra();toast('저장됐어요 ✓');
};

function ra(){rSum();rInc();rBud();rSpd();rInv();rFix()}
</script>
</body>
</html>
